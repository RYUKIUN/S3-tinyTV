[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── N16R8: 16MB QIO Flash + 8MB OPI PSRAM ───────────────────────────────────
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

monitor_speed = 115200
; monitor_port = COM3   ; uncomment and set for Windows

upload_protocol = esptool

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

build_flags =
    ; ── PSRAM (N16R8 OPI) ───────────────────────────────────────────────────
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SPEED_80M
    -DCONFIG_ESP32S3_DATA_CACHE_64KB

    ; ── USB CDC ─────────────────────────────────────────────────────────────
    ; ARDUINO_USB_CDC_ON_BOOT=1  : routes Serial to USB CDC (not UART0)
    ; ARDUINO_USB_MODE=1         : uses built-in USB Serial/JTAG peripheral
    ; Together these make the board appear as a USB Serial device on the host
    ; with NO extra drivers on Linux/macOS and the built-in driver on Win10+.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    ; ── Framework / build ───────────────────────────────────────────────────
    -DLGFX_USE_V1
    -DESP32S3
    -O3
    -DCONFIG_FREERTOS_HZ=1000
    -ffast-math

board_build.f_cpu = 240000000L