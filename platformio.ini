[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── N16R8: 16MB QIO Flash + 8MB OPI PSRAM ───────────────────────────────────
; This line is CRITICAL for N16R8. Without it, PSRAM is "found" but not
; mapped to the heap, so heap_caps_malloc(MALLOC_CAP_SPIRAM) silently fails.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

monitor_speed = 115200
; monitor_port = COM3   ; uncomment and set for Windows

upload_protocol = esptool

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    bitbank2/JPEGDEC @ ^1.8.4

build_flags =
    ; PSRAM - N16R8 OPI
    -DBOARD_HAS_PSRAM
    ; S3 USB CDC
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -DESP32S3
    -O3
    -DCONFIG_SPIRAM_SPEED_80M
    -ffast-math
    -DCONFIG_ESP32S3_DATA_CACHE_64KB
    -DCONFIG_IDF_TARGET_ESP32S3

board_build.f_cpu = 240000000L